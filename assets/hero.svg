<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="closss profile banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05060A"/>
      <stop offset="0.44" stop-color="#08101F"/>
      <stop offset="1" stop-color="#0B0614"/>
    </linearGradient>
    <radialGradient id="aura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(810 180) rotate(142) scale(520 260)">
      <stop stop-color="#34D399" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#05060A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(902 211) rotate(90) scale(130)">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.16" stop-color="#5EEAD4"/>
      <stop offset="0.42" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="236" y1="92" x2="938" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.85 0 0 0 0 1 0 0 0 0.85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#94A3B8" stroke-opacity="0.08"/>
    </pattern>
    <style>
      @keyframes orbit {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -520; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .48; transform: scale(1); }
        50% { opacity: .92; transform: scale(1.025); }
      }
      @keyframes drift {
        0%, 100% { transform: translate3d(0, 0, 0); opacity: .62; }
        50% { transform: translate3d(22px, -10px, 0); opacity: 1; }
      }
      .orbit-line {
        stroke-dasharray: 18 18;
        animation: orbit 14s linear infinite;
      }
      .pulse {
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 5.5s ease-in-out infinite;
      }
      .drift {
        animation: drift 8s ease-in-out infinite;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }
      .sans {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </defs>
  <rect width="1280" height="420" rx="0" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)"/>
  <rect width="1280" height="420" fill="url(#aura)"/>
  <path d="M0 354C181 290 320 310 438 333C614 368 760 409 1028 318C1124 285 1204 278 1280 284V420H0V354Z" fill="#020617" fill-opacity="0.48"/>
