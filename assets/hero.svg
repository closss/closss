    <path d="M1010 146H1194" stroke="#94A3B8" stroke-opacity="0.08"/>
  </g>
  <g class="drift" opacity="0.95">
    <circle cx="1094" cy="80" r="2" fill="#E0F2FE"/>
    <circle cx="1148" cy="172" r="1.5" fill="#A7F3D0"/>
    <circle cx="1040" cy="220" r="1.2" fill="#DDD6FE"/>
