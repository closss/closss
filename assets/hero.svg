    <circle cx="214" cy="236" r="1.4" fill="#DDD6FE"/>
  </g>
  <g filter="url(#glow)" transform="translate(812 56)">
    <ellipse class="orbit-line" cx="112" cy="154" rx="242" ry="72" stroke="url(#line)" stroke-width="2.4" transform="rotate(-18 112 154)"/>
    <ellipse class="orbit-line" cx="112" cy="154" rx="202" ry="58" stroke="#5EEAD4" stroke-opacity="0.52" stroke-width="1.5" transform="rotate(22 112 154)"/>
    <ellipse class="orbit-line" cx="112" cy="154" rx="150" ry="42" stroke="#A78BFA" stroke-opacity="0.45" stroke-width="1.4" transform="rotate(68 112 154)"/>
    <circle class="pulse" cx="112" cy="154" r="58" fill="url(#core)"/>
    <circle cx="112" cy="154" r="13" fill="#ECFEFF"/>
    <circle cx="289" cy="91" r="5" fill="#A7F3D0"/>
    <circle cx="-43" cy="201" r="4" fill="#38BDF8"/>
    <circle cx="215" cy="255" r="3.5" fill="#C4B5FD"/>
  </g>
  <g transform="translate(76 82)">
    <text class="mono" x="0" y="0" fill="#67E8F9" font-size="18" opacity="0.92">closss@github</text>
    <text class="sans" x="0" y="72" fill="#F8FAFC" font-size="70" font-weight="800">quiet systems,</text>
    <text class="sans" x="0" y="148" fill="#F8FAFC" font-size="70" font-weight="800">sharp interfaces.</text>
    <rect x="2" y="184" width="560" height="1" fill="url(#line)" opacity="0.72"/>
    <text class="mono" x="0" y="232" fill="#CBD5E1" font-size="22">AI tools / visual computing / clean engineering</text>
  </g>
  <g class="mono" font-size="15">
